<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a3a5c" />
  <title>Pirate Fight</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div id="health-bar-wrap">
        <div id="health-label">HP</div>
        <div id="health-bar-bg"><div id="health-bar"></div></div>
      </div>
      <div id="score">Pirates defeated: <span id="kills">0</span></div>
    </div>

    <div id="joystick-zone">
      <div id="joystick-base"><div id="joystick-stick"></div></div>
    </div>

    <button id="attack-btn">ATTACK!</button>

    <div id="start-screen" class="overlay">
      <h1>PIRATE FIGHT</h1>
      <p class="subtitle">Defend your ship from enemy pirates!</p>
      <div class="instructions">
        <div>Move: Left joystick (or WASD)</div>
        <div>Swing sword: ATTACK button (or Space)</div>
      </div>
      <button id="start-btn">START</button>
    </div>

    <div id="game-over-screen" class="overlay hidden">
      <h1 id="game-over-title">YE BE DEFEATED!</h1>
      <p>Pirates defeated: <span id="final-kills">0</span></p>
      <button id="restart-btn">FIGHT AGAIN</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
